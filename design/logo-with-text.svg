<svg width="256" height="64" viewBox="0 0 256 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- TokenFusion 文字标 - "Token" 白色 + "Fusion" 渐变青色 -->
  <defs>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
  </defs>
  
  <!-- "Token" 白色 -->
  <text x="0" y="44" font-family="Inter, sans-serif" font-size="40" font-weight="700" fill="#FFFFFF" letter-spacing="-1">Token</text>
  <!-- "Fusion" 渐变青色 -->
  <text x="118" y="44" font-family="Inter, sans-serif" font-size="40" font-weight="700" fill="url(#textGradient)" letter-spacing="-1">Fusion</text>
</svg>
