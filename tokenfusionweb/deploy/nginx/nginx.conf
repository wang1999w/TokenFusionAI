# ============================================================
# TokenFusion AI 生产环境 Nginx 配置
# ============================================================
#
# 职责：
# 1. 前端静态文件托管与 SSR 代理
# 2. /api 代理至业务后端（backend-api）
# 3. /gateway 代理至 AI 网关（gateway，SSE 流式支持）
# 4. SSL 证书配置（HTTPS 强制）
# 5. gzip 压缩（提升传输效率）
# 6. 安全响应头（X-Frame-Options / HSTS 等）
#
# 架构：
#   客户端 -> Nginx(443) -> /api      -> backend-api:3000
#                       -> /gateway  -> gateway:3001（SSE）
#                       -> /         -> web:3002（Next.js SSR）
# ============================================================

# 运行用户
user nginx;
# 工作进程数（与 CPU 核心数对齐）
worker_processes auto;
# PID 文件
pid /var/run/nginx.pid;

# 错误日志
error_log /var/log/nginx/error.log warn;

events {
    # 单个工作进程最大连接数
    worker_connections 2048;
    # 允许一次接受多个连接
    multi_accept on;
}

http {
    # ------------------------------------------------------------
    # 基础配置
    # ------------------------------------------------------------
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # 日志格式（包含请求耗时，便于性能分析）
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time urt=$upstream_response_time';

    access_log /var/log/nginx/access.log main;

    # sendfile 零拷贝，提升静态文件传输效率
    sendfile on;
    # 数据包合并发送
    tcp_nopush on;
    tcp_nodelay on;
    # 长连接超时
    keepalive_timeout 65;
    # 客户端上传文件大小限制（图像 / 视频上传）
    client_max_body_size 50m;
    # 类型哈希表大小
    types_hash_max_size 2048;

    # ------------------------------------------------------------
    # gzip 压缩配置（降低传输体积，加速首屏）
    # ------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        application/xhtml+xml
        application/x-javascript
        application/x-font-ttf
        application/vnd.ms-fontobject
        image/svg+xml
        font/woff
        font/woff2;

    # ------------------------------------------------------------
    # 上游服务定义（Docker 内部服务名）
    # ------------------------------------------------------------
    # Next.js 前端（SSR）
    upstream web_upstream {
        server web:3002;
        keepalive 32;
    }
    # 业务后端 API
    upstream backend_upstream {
        server backend-api:3000;
        keepalive 32;
    }
    # AI 网关
    upstream gateway_upstream {
        server gateway:3001;
        keepalive 32;
    }

    # ------------------------------------------------------------
    # HTTP -> HTTPS 强制跳转
    # ------------------------------------------------------------
    server {
        listen 80;
        listen [::]:80;
        server_name _;

        # 所有 HTTP 请求 301 重定向到 HTTPS
        return 301 https://$host$request_uri;
    }

    # ------------------------------------------------------------
    # HTTPS 主服务
    # ------------------------------------------------------------
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        server_name _;

        # --------------------------------------------------------
        # SSL 证书配置
        # --------------------------------------------------------
        ssl_certificate /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        # TLS 协议版本（仅允许 1.2 / 1.3，禁用不安全版本）
        ssl_protocols TLSv1.2 TLSv1.3;
        # 加密套件（优先使用前向保密）
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
        # 服务端优先选择加密套件
        ssl_prefer_server_ciphers on;
        # 会话缓存（减少 TLS 握手开销）
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;
        # OCSP 装订（提升证书校验速度）
        ssl_stapling on;
        ssl_stapling_verify on;

        # --------------------------------------------------------
        # 安全响应头
        # --------------------------------------------------------
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

        # --------------------------------------------------------
        # /gateway 代理 -> AI 网关（支持 SSE 流式）
        # 注意：必须关闭 buffer，否则流式响应会被缓存导致打字机失效
        # --------------------------------------------------------
        location /gateway {
            proxy_pass http://gateway_upstream;

            # SSE 流式必需：关闭缓冲
            proxy_buffering off;
            proxy_cache off;
            proxy_http_version 1.1;
            # 清除 Connection 头，允许长连接
            proxy_set_header Connection "";

            # 透传客户端信息
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # SSE 长连接超时设置（AI 生成可能较慢）
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
            # 禁用分块缓冲
            chunked_transfer_encoding on;
        }

        # --------------------------------------------------------
        # /api 代理 -> 业务后端 API
        # --------------------------------------------------------
        location /api {
            proxy_pass http://backend_upstream;

            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # 健康检查与普通 API 超时
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
        }

        # --------------------------------------------------------
        # Next.js SSR 代理（默认路由）
        # --------------------------------------------------------
        location / {
            proxy_pass http://web_upstream;

            proxy_http_version 1.1;
            # 支持 WebSocket（HMR 等场景）
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
        }

        # --------------------------------------------------------
        # Next.js 静态资源缓存（_next/static 长效缓存）
        # --------------------------------------------------------
        location /_next/static/ {
            proxy_pass http://web_upstream;
            # 静态资源带 hash，可长期缓存
            proxy_cache_valid 200 365d;
            add_header Cache-Control "public, max-age=31536000, immutable";
            # 同时透传安全头
            add_header X-Content-Type-Options "nosniff" always;
        }

        # --------------------------------------------------------
        # 健康检查端点（负载均衡器探测用）
        # --------------------------------------------------------
        location = /health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        # --------------------------------------------------------
        # 错误页配置
        # --------------------------------------------------------
        error_page 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
            internal;
        }
    }
}
